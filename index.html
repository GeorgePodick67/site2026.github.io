<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PG STORE — минимализм / корзина</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.4;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* header */
        .header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            z-index: 100;
            border-bottom: 1px solid #eaeaea;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #000000;
        }

        .logo span {
            font-weight: 400;
            color: #3a3a3a;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #1a1a1a;
            transition: 0.2s;
        }

        .nav-links a:hover {
            border-bottom: 1.5px solid #000;
            padding-bottom: 4px;
        }

        /* иконка корзины */
        .cart-icon {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 6px 16px;
            border-radius: 40px;
            transition: 0.2s;
            font-weight: 500;
        }

        .cart-icon:hover {
            background: #e0e0e0;
        }

        .cart-count {
            background: #000;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 30px;
            padding: 2px 8px;
            min-width: 22px;
            text-align: center;
        }

        /* hero */
        .hero {
            padding: 100px 0 120px;
            border-bottom: 1px solid #ececec;
        }

        .hero-tag {
            display: inline-block;
            background: #f0f0f0;
            padding: 6px 18px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 32px;
            text-transform: uppercase;
        }

        .hero h1 {
            font-size: clamp(4rem, 12vw, 7.5rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
        }

        .hero h1 span {
            font-weight: 300;
            border-bottom: 2px solid #000;
        }

        .hero p {
            font-size: 1.1rem;
            color: #2e2e2e;
            max-width: 480px;
            margin-bottom: 48px;
            border-left: 3px solid #000;
            padding-left: 20px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-primary, .btn-outline {
            display: inline-block;
            padding: 14px 34px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
            border: 1.5px solid #000;
            cursor: pointer;
        }

        .btn-primary {
            background: #000;
            color: white;
        }
        .btn-primary:hover {
            background: transparent;
            color: #000;
        }
        .btn-outline {
            background: transparent;
            color: #000;
        }
        .btn-outline:hover {
            background: #000;
            color: white;
        }

        /* товары */
        .products {
            padding: 80px 0 100px;
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 60px;
        }
        .section-title span {
            font-weight: 300;
            border-bottom: 2px solid #000;
            padding-bottom: 4px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px 24px;
        }

        .product-card {
            background: #fff;
            border: 1px solid #eaeaea;
            transition: 0.25s;
        }
        .product-card:hover {
            border-color: #000;
            transform: translateY(-6px);
        }

        .product-img {
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .product-img img {
            max-width: 100%;
            max-height: 210px;
            object-fit: contain;
        }

        .product-info {
            padding: 22px 22px 28px;
        }
        .product-category {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #3a3a3a;
            background: #f2f2f2;
            display: inline-block;
            padding: 4px 12px;
            margin-bottom: 14px;
        }
        .product-info h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .price {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 12px 0 22px;
        }
        .btn-card {
            width: 100%;
            background: #fff;
            border: 1.5px solid #000;
            padding: 14px 0;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-card:hover {
            background: #000;
            color: white;
        }

        /* форма */
        .form-section {
            padding: 60px 0 90px;
            background: #fefefe;
            border-top: 1px solid #eaeaea;
        }
        .form-container {
            max-width: 760px;
            margin: 0 auto;
            background: #fff;
            padding: 48px 44px;
            border: 1px solid #e0e0e0;
        }
        .form-container h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .form-container h2 span {
            border-bottom: 2px solid #000;
            font-weight: 400;
        }
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #cdcdcd;
            background: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #000;
            outline: none;
        }
        .form-btn {
            background: #000;
            color: white;
            border: none;
            padding: 16px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }
        .form-btn:hover {
            background: #2a2a2a;
        }

        /* БОКОВАЯ КОРЗИНА (drawer) */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -450px;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: white;
            box-shadow: -4px 0 20px rgba(0,0,0,0.05);
            z-index: 1001;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #eaeaea;
        }
        .cart-drawer.open {
            right: 0;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid #eee;
        }
        .cart-header h3 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .close-drawer {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 12px;
        }
        .cart-item-info {
            flex: 2;
        }
        .cart-item-info h4 {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .cart-item-price {
            font-weight: 600;
        }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .qty-btn {
            background: #f2f2f2;
            border: none;
            width: 28px;
            height: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .qty-btn:hover {
            background: #ddd;
        }
        .item-qty {
            min-width: 24px;
            text-align: center;
        }
        .remove-item {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.6;
        }
        .remove-item:hover {
            opacity: 1;
        }
        .cart-footer {
            padding: 20px;
            border-top: 1px solid #eee;
        }
        .cart-total {
            font-size: 1.3rem;
            font-weight: 700;
            text-align: right;
            margin-bottom: 20px;
        }
        .clear-cart {
            width: 100%;
            background: #f5f5f5;
            border: 1px solid #ccc;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .clear-cart:hover {
            background: #e0e0e0;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: white;
            padding: 12px 28px;
            font-size: 0.85rem;
            z-index: 1100;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .footer {
            background: #fafafa;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid #e0e0e0;
        }
        @media (max-width: 600px) {
            .cart-drawer { max-width: 100%; }
            .container { padding: 0 20px; }
            .hero { padding: 60px 0; }
        }

        .product-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #fff;
            border: 1px solid #eaeaea;
            transition: 0.25s;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding: 22px 22px 28px;
        }

        .btn-card {
            margin-top: auto;        /* прижимает кнопку к низу */
            width: 100%;
            background: #fff;
            border: 1.5px solid #000;
            padding: 14px 0;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        /* чтобы карточки в сетке были одинаковой высоты */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px 24px;
            align-items: stretch;
        }
    </style> 
    
</head>
<body>

<header class="header">
    <div class="container">
        <nav class="nav">
            <div class="logo">PG<span>STORE</span></div>
            <ul class="nav-links">
                <li><a href="#home">Главная</a></li>
                <li><a href="#products">Продукты</a></li>
                <li><a href="#contact">Контакты</a></li>
                <li><div class="cart-icon" id="cartIcon">🛒 <span class="cart-count" id="cartCount">0</span></div></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <section id="home" class="hero">
        <div class="container">
            <h1>PG<br><span>STORE</span></h1>
            <p>Обувь <em>одежда и аксессуары</em></p>
            <div class="btn-group">
                <a href="#products" class="btn-primary">Каталог →</a>
                <a href="#contact" class="btn-outline">Контакты</a>
            </div>
        </div>
    </section>

    <section id="products" class="products">
        <div class="container">
            <h2 class="section-title">— <span>ХИТЫ ПРОДАЖ</span> —</h2>
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </section>

    <section id="contact" class="form-section">
        <div class="form-container">
            <h2>Есть <span>вопросы?</span></h2>
            <p>Оставь заявку — ответим в течение 10 минут.</p>
            <form id="ddxForm">
                <div class="form-grid">
                    <input type="text" name="name" placeholder="Ваше имя *" required>
                    <input type="email" name="email" placeholder="Email *" required>
                    <input type="tel" name="phone" placeholder="Телефон">
                    <input type="text" name="subject" placeholder="Тема вопроса">
                    <textarea rows="3" name="message" placeholder="Ваше сообщение..."></textarea>
                    <button type="submit" class="form-btn">Отправить заявку →</button>
                </div>
            </form>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="container"><p>© 2026 <strong>PG STORE</strong> — Все права защищены.</p></div>
</footer>

<!-- Боковая корзина -->
<div class="overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
        <h3>КОРЗИНА</h3>
        <button class="close-drawer" id="closeDrawerBtn">&times;</button>
    </div>
    <div class="cart-items" id="cartItemsContainer">
        <p style="text-align:center; padding: 20px;">Корзина пуста</p>
    </div>
    <div class="cart-footer">
        <div class="cart-total" id="cartTotalDrawer">Итого: 0 ₽</div>
        <button id="clearCartDrawerBtn" class="clear-cart">Очистить корзину</button>
    </div>
</div>
<div class="product-card">
    <div class="product-img">...</div>
    <div class="product-info">
        <div class="product-category">...</div>
        <h3>...</h3>
        <div class="price">...</div>
        <button class="btn-card">В корзину →</button>
    </div>
</div>
<div id="toastMessage" class="toast-msg">Товар добавлен</div>
<body>
<script src="js.js"> // ----- ТОВАРЫ -----
    const productsData = [
        { id: 1, name: "Nike Air Force 1 Mid Off-White", category: "LIMITED", price: 29990, img: "https://i.ebayimg.com/images/g/PlEAAOSwK9FnP0lX/s-l1600.jpg" },
        { id: 2, name: "Air Jordan 1 Mid SE Craft", category: "КОЛЛАБОРАЦИЯ", price: 34490, img: "https://n.cdn.cdek.shopping/images/shopping/BYI5sB9ZySm3IKqD.jpg?v=1" },
        { id: 3, name: "Yeezy 500 Utility Black", category: "ПРЕМИУМ", price: 47990, img: "https://e0.pxfuel.com/wallpapers/586/477/desktop-wallpaper-adidas-yeezy-500-utility-black-deals-on-sneakers-sneakers-black-deals-shoes.jpg" },
        { id: 4, name: "New Balance 2002R Protection Pack", category: "НОВИНКА", price: 26990, img: "https://avatars.mds.yandex.net/get-mpic/5098271/2a00000192f273cf37d270827960ea256b17/orig" }
        
    ];

    let cart = []; // { id, name, price, quantity }

    // загрузка из localStorage
    function loadCart() {
        const saved = localStorage.getItem('pg_cart_mono');
        if (saved) {
            try { cart = JSON.parse(saved); } catch(e) { cart = []; }
        } else { cart = []; }
        updateCartUI();
    }

    function saveCart() {
        localStorage.setItem('pg_cart_mono', JSON.stringify(cart));
    }

    function addToCart(productId) {
        const product = productsData.find(p => p.id === productId);
        if (!product) return;
        const existing = cart.find(item => item.id === productId);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ id: product.id, name: product.name, price: product.price, quantity: 1 });
        }
        saveCart();
        updateCartUI();
        showToast(`${product.name} +1`);
        openDrawer(); // открываем корзину после добавления (удобно)
    }

    function changeQuantity(id, delta) {
        const idx = cart.findIndex(item => item.id === id);
        if (idx === -1) return;
        const newQty = cart[idx].quantity + delta;
        if (newQty <= 0) {
            cart.splice(idx, 1);
        } else {
            cart[idx].quantity = newQty;
        }
        saveCart();
        updateCartUI();
    }

    function removeItem(id) {
        cart = cart.filter(item => item.id !== id);
        saveCart();
        updateCartUI();
        showToast("Товар удалён");
    }

    function clearCart() {
        if (cart.length === 0) return;
        cart = [];
        saveCart();
        updateCartUI();
        showToast("Корзина очищена");
    }

    function updateCartUI() {
        // счётчик в иконке
        const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
        document.getElementById('cartCount').innerText = totalItems;

        // отрисовка корзины (drawer)
        const container = document.getElementById('cartItemsContainer');
        const totalBlock = document.getElementById('cartTotalDrawer');
        if (!container) return;

        if (cart.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding: 20px;">Корзина пуста</p>';
            if (totalBlock) totalBlock.innerText = 'Итого: 0 ₽';
            return;
        }

        let html = '';
        let totalSum = 0;
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            totalSum += itemTotal;
            html += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h4>${escapeHtml(item.name)}</h4>
                        <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                    </div>
                    <div class="cart-item-actions">
                        <button class="qty-btn" data-id="${item.id}" data-delta="-1">−</button>
                        <span class="item-qty">${item.quantity}</span>
                        <button class="qty-btn" data-id="${item.id}" data-delta="1">+</button>
                        <button class="remove-item" data-id="${item.id}" title="Удалить">✕</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        if (totalBlock) totalBlock.innerText = `Итого: ${totalSum.toLocaleString()} ₽`;

        // обработчики кнопок +/-
        document.querySelectorAll('.qty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                const delta = parseInt(btn.getAttribute('data-delta'));
                changeQuantity(id, delta);
            });
        });
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                removeItem(id);
            });
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<script>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toastMessage');
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    // отрисовка карточек товаров
    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        grid.innerHTML = '';
        productsData.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-img"><img src="${prod.img}" alt="${prod.name}"></div>
                <div class="product-info">
                    <div class="product-category">${prod.category}</div>
                    <h3>${prod.name}</h3>
                    <div class="price">${prod.price.toLocaleString()} ₽</div>
                    <button class="btn-card add-btn" data-id="${prod.id}">В корзину →</button>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                addToCart(id);
            });
        });
    }

    // ----- УПРАВЛЕНИЕ ДРАВЕРОМ -----
    const drawer = document.getElementById('cartDrawer');
    const overlay = document.getElementById('cartOverlay');
    const openCartBtn = document.getElementById('cartIcon');
    const closeDrawerBtn = document.getElementById('closeDrawerBtn');
    const clearCartDrawerBtn = document.getElementById('clearCartDrawerBtn');

    function openDrawer() {
        drawer.classList.add('open');
        overlay.classList.add('active');
        updateCartUI(); // обновить на случай изменений
    }
    function closeDrawer() {
        drawer.classList.remove('open');
        overlay.classList.remove('active');
    }
    if (openCartBtn) openCartBtn.addEventListener('click', openDrawer);
    if (closeDrawerBtn) closeDrawerBtn.addEventListener('click', closeDrawer);
    if (overlay) overlay.addEventListener('click', closeDrawer);
    if (clearCartDrawerBtn) clearCartDrawerBtn.addEventListener('click', () => {
        clearCart();
        updateCartUI();
    });

    // форма обратной связи
    const form = document.getElementById('ddxForm');
    if (form) {
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = form.querySelector('input[name="name"]').value;
            alert(`Спасибо, ${name}! Мы свяжемся с вами.`);
            form.reset();
        });
    }

    // плавный скролл
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
            const targetId = this.getAttribute('href');
            if (targetId === "#" || targetId === "") return;
            const target = document.querySelector(targetId);
            if (target) {
                e.preventDefault();
                target.scrollIntoView({ behavior: 'smooth' });
            }
        });
    });

    renderProducts();
    loadCart();
    </script>
</body>
</html>
